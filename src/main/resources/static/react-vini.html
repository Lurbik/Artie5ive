<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artie5ive — Catalogo React</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-sec: #111;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --wine: #722f37;
            --wine-light: #9b3d47;
            --text: #f0ebe3;
            --text-sec: #a89880;
            --muted: #666;
            --border: #2a2a2a;
            --border-gold: #c9a84c44;
            --radius: 8px;
            --font: 'Playfair Display', serif;
            --ui: 'Raleway', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--ui);
            min-height: 100vh;
        }

        nav {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border-gold);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: var(--font);
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
        }

        .brand::before {
            content: '— ';
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-sec);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            font-family: var(--font);
            font-weight: normal;
            color: var(--gold);
            font-size: 2rem;
            letter-spacing: 0.05em;
        }

        .filtri-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filtri-bar label {
            display: block;
            color: var(--text-sec);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .filtri-bar input,
        .filtri-bar select {
            background: var(--bg-sec);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            color: var(--text);
            font-family: var(--ui);
            font-size: 0.9rem;
            min-width: 160px;
        }

        .filtri-bar input:focus,
        .filtri-bar select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
        }

        .btn-primary {
            border-color: var(--gold);
            color: var(--gold);
            background: transparent;
        }

        .btn-primary:hover {
            background: var(--gold);
            color: var(--bg);
        }

        .btn-secondary {
            border-color: var(--border);
            color: var(--text-sec);
            background: transparent;
        }

        .btn-secondary:hover {
            border-color: var(--text-sec);
            color: var(--text);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card::before {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, var(--wine), var(--gold));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            border-color: var(--border-gold);
            transform: translateY(-2px);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-placeholder {
            width: 100%;
            height: 180px;
            background: var(--bg-sec);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 1.25rem;
        }

        .card-title {
            font-family: var(--font);
            font-size: 1.05rem;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .card-sub {
            color: var(--gold);
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px solid;
            margin: 0.15rem;
        }

        .badge-wine {
            color: var(--wine-light);
            border-color: var(--wine);
        }

        .badge-muted {
            color: var(--muted);
            border-color: var(--border);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--gold);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .modal-img {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .modal-placeholder {
            width: 100%;
            height: 220px;
            background: var(--bg-sec);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .modal-title {
            font-family: var(--font);
            font-size: 1.8rem;
            font-weight: normal;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .modal-meta {
            color: var(--gold);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .attr {
            background: var(--bg-sec);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
        }

        .attr-label {
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .attr-value {
            color: var(--text);
            font-size: 0.9rem;
        }

        .rec-card {
            background: var(--bg-sec);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .rec-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .rec-autore {
            color: var(--gold);
            font-size: 0.85rem;
        }

        .stelle {
            color: var(--gold);
        }

        .rec-testo {
            color: var(--text-sec);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 1.1rem;
        }

        .empty {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
        }

        @media(max-width:600px) {
            .modal-grid {
                grid-template-columns: 1fr;
            }

            .attr-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a class="brand" href="/">ARTIE<span style="color:#9b3d47">5</span>IVE</a>
        <div class="nav-links">
            <a href="/vini">Vini</a>
            <a href="/produttori">Produttori</a>
            <a href="/react-vini.html" style="color:#c9a84c">Catalogo React</a>
        </div>
    </nav>

    <div class="container">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function stelle(voto) {
            return '★'.repeat(voto) + '☆'.repeat(5 - voto);
        }

        function ModalVino({ vino, onClose }) {
            const [recensioni, setRecensioni] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`/api/vini/${vino.id}/recensioni`)
                    .then(r => r.json())
                    .then(data => { setRecensioni(data); setLoading(false); })
                    .catch(() => { setRecensioni([]); setLoading(false); });
            }, [vino.id]);

            return (
                <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="modal">
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="modal-grid">
                            <div>
                                {vino.immagine
                                    ? <img className="modal-img" src={`/uploads/${vino.immagine}`} alt={vino.nome} />
                                    : <div className="modal-placeholder">🍷</div>
                                }
                            </div>
                            <div>
                                <h2 className="modal-title">{vino.nome}</h2>
                                <div className="modal-meta">
                                    {vino.produttore}{vino.regione ? ` · ${vino.regione}` : ''}
                                </div>
                                <div style={{ marginBottom: '1rem' }}>
                                    <span className="badge badge-wine">{vino.colore}</span>
                                    <span className="badge badge-muted">{vino.stile}</span>
                                </div>
                                <div className="attr-grid">
                                    <div className="attr">
                                        <div className="attr-label">Annata</div>
                                        <div className="attr-value">{vino.annata}</div>
                                    </div>
                                    {vino.gradazione && (
                                        <div className="attr">
                                            <div className="attr-label">Gradazione</div>
                                            <div className="attr-value">{vino.gradazione}% vol</div>
                                        </div>
                                    )}
                                </div>
                                {vino.descrizione && (
                                    <p style={{ color: '#a89880', lineHeight: 1.6, fontSize: '0.9rem' }}>{vino.descrizione}</p>
                                )}
                            </div>
                        </div>

                        <div style={{ borderTop: '1px solid #2a2a2a', paddingTop: '1.5rem' }}>
                            <h3 style={{
                                fontFamily: 'Playfair Display, serif', color: '#c9a84c',
                                fontWeight: 'normal', marginBottom: '1rem', fontSize: '1.2rem'
                            }}>
                                Recensioni
                            </h3>
                            {loading && <div className="loading">Caricamento...</div>}
                            {!loading && recensioni.length === 0 && (
                                <div style={{ color: '#666', fontSize: '0.9rem' }}>Nessuna recensione ancora.</div>
                            )}
                            {recensioni.map(r => (
                                <div key={r.id} className="rec-card">
                                    <div className="rec-header">
                                        <span className="rec-autore">{r.utente}</span>
                                        <span className="stelle">{stelle(r.voto)}</span>
                                    </div>
                                    <p className="rec-testo">{r.testo}</p>
                                    <p style={{ color: '#666', fontSize: '0.78rem', marginTop: '0.4rem' }}>{r.data}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [vini, setVini] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filtroNome, setFiltroNome] = useState('');
            const [filtroColore, setFiltroColore] = useState('');
            const [vinoSelezionato, setVinoSelezionato] = useState(null);

            useEffect(() => {
                fetch('/api/vini')
                    .then(r => r.json())
                    .then(data => { setVini(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            const viniFiltrati = vini.filter(v => {
                const nomeOk = v.nome.toLowerCase().includes(filtroNome.toLowerCase());
                const coloreOk = !filtroColore || v.colore === filtroColore;
                return nomeOk && coloreOk;
            });

            const colori = [...new Set(vini.map(v => v.colore).filter(Boolean))];

            return (
                <div>
                    <div className="page-header">
                        <h1>Catalogo React</h1>
                        <span style={{ color: '#666', fontSize: '0.85rem' }}>
                            {viniFiltrati.length} vino{viniFiltrati.length !== 1 ? 'i' : ''}
                        </span>
                    </div>

                    <div className="filtri-bar">
                        <div>
                            <label>Cerca</label>
                            <input
                                type="text"
                                placeholder="Nome del vino..."
                                value={filtroNome}
                                onChange={e => setFiltroNome(e.target.value)}
                            />
                        </div>
                        <div>
                            <label>Colore</label>
                            <select value={filtroColore} onChange={e => setFiltroColore(e.target.value)}>
                                <option value="">Tutti</option>
                                {colori.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        {(filtroNome || filtroColore) && (
                            <button className="btn btn-secondary"
                                onClick={() => { setFiltroNome(''); setFiltroColore(''); }}>
                                Reset
                            </button>
                        )}
                    </div>

                    {loading && <div className="loading">Caricamento vini...</div>}

                    {!loading && viniFiltrati.length === 0 && (
                        <div className="empty"><p>Nessun vino trovato.</p></div>
                    )}

                    <div className="card-grid">
                        {viniFiltrati.map(vino => (
                            <div key={vino.id} className="card" onClick={() => setVinoSelezionato(vino)}>
                                {vino.immagine
                                    ? <img className="card-img" src={`/uploads/${vino.immagine}`} alt={vino.nome} />
                                    : <div className="card-placeholder">🍷</div>
                                }
                                <div className="card-body">
                                    <div className="card-title">{vino.nome}</div>
                                    <div className="card-sub">
                                        {vino.produttore ? `${vino.produttore} · ` : ''}{vino.annata}
                                    </div>
                                    <div>
                                        <span className="badge badge-wine">{vino.colore}</span>
                                        <span className="badge badge-muted">{vino.stile}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {vinoSelezionato && (
                        <ModalVino vino={vinoSelezionato} onClose={() => setVinoSelezionato(null)} />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
