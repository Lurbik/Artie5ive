<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<body>
    <nav th:fragment="navbar">
        <div class="nav-brand">
            <a th:href="@{/}">ARTIE<span style="color: var(--accent-wine-light)">5</span>IVE</a>
        </div>

        <button class="nav-hamburger" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>

        <div class="nav-links" id="navLinks">
            <a th:href="@{/vini}">Vini</a>
            <a th:href="@{/produttori}">Produttori</a>
            <a th:href="@{/react-vini}">Catalogo React</a>
            <a th:href="@{/analisi}">Analisi Prestazioni</a>

            <div class="nav-dropdown" sec:authorize="hasRole('ADMIN')">
                <button class="nav-dropdown-toggle" id="adminToggle">
                    Gestisci <span class="nav-dropdown-arrow">▾</span>
                </button>
                <div class="nav-dropdown-menu" id="adminMenu">
                    <div class="nav-dropdown-inner">
                        <a th:href="@{/admin/vini}">Vini</a>
                        <a th:href="@{/admin/produttori}">Produttori</a>
                        <a th:href="@{/admin/regioni}">Regioni</a>
                        <a th:href="@{/admin/categorie}">Categorie</a>
                        <a th:href="@{/admin/recensioni}">Recensioni</a>
                    </div>
                </div>
            </div>

            <span sec:authorize="isAnonymous()" style="display:contents">
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/registrazione}">Registrati</a>
            </span>

            <span sec:authorize="isAuthenticated()" style="display:contents">
                <a th:href="@{/profilo}">Profilo</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="nav-logout">Logout</button>
                </form>
            </span>
        </div>
    </nav>

    <script>
        document.getElementById('navToggle').addEventListener('click', function () {
            document.getElementById('navLinks').classList.toggle('nav-open');
        });

        const adminToggle = document.getElementById('adminToggle');
        const adminMenu = document.getElementById('adminMenu');
        if (adminToggle) {
            adminToggle.addEventListener('click', function (e) {
                e.stopPropagation();
                adminMenu.classList.toggle('open');
            });
            document.addEventListener('click', function () {
                adminMenu.classList.remove('open');
            });
        }
    </script>
</body>

</html>
