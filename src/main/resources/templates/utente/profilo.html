<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Profilo')}">

<body>
    <th:block th:fragment="content">

        <div class="page-header">
            <h1>Il tuo profilo</h1>
        </div>

        <div style="display: grid; grid-template-columns: 300px 1fr; gap: 2rem">

            <!-- Info utente -->
            <div class="card">
                <div class="card-body">
                    <div style="text-align:center; padding: 1rem 0 1.5rem">
                        <div style="width:80px; height:80px; border-radius:50%; background: var(--bg-secondary);
                                border: 2px solid var(--border-gold); margin: 0 auto 1rem;
                                display:flex; align-items:center; justify-content:center;
                                font-size:2rem; color: var(--accent-gold)">
                            ◈
                        </div>
                        <div class="card-title" th:text="${utente.nome} + ' ' + ${utente.cognome}"></div>
                        <div class="card-subtitle" th:text="'@' + ${utente.username}"></div>
                    </div>
                    <div class="attributo" style="margin-bottom:0.75rem">
                        <div class="attributo-label">Ruolo</div>
                        <div class="attributo-value">
                            <span class="badge badge-gold" th:text="${utente.ruolo}"></span>
                        </div>
                    </div>
                    <div class="attributo">
                        <div class="attributo-label">Recensioni scritte</div>
                        <div class="attributo-value" th:text="${#lists.size(recensioni)}"></div>
                    </div>
                </div>
            </div>

            <!-- Recensioni -->
            <div>
                <h2 style="font-family: var(--font-main); font-weight:normal; color: var(--accent-gold);
                       margin-bottom:1.5rem; font-size:1.4rem">Le tue recensioni</h2>

                <div th:if="${#lists.isEmpty(recensioni)}"
                    style="color: var(--text-muted); text-align:center; padding: 3rem">
                    Non hai ancora scritto recensioni.
                </div>

                <div th:each="rec : ${recensioni}" class="recensione-card">
                    <div class="recensione-header">
                        <span class="recensione-autore" th:text="${rec.vino.nome}"></span>
                        <div class="stelle">
                            <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                <span th:text="${i <= rec.voto} ? '★' : '☆'"></span>
                            </th:block>
                        </div>
                    </div>
                    <p class="recensione-testo" th:text="${rec.testo}"></p>
                    <p style="color: var(--text-muted); font-size:0.8rem; margin-top:0.5rem" th:text="${rec.data}"></p>
                    <div style="display:flex; gap:0.75rem; margin-top:1rem">
                        <a th:href="@{/recensioni/modifica/{id}(id=${rec.id})}" class="btn-secondary"
                            style="font-size:0.8rem; padding:0.4rem 1rem">
                            Modifica
                        </a>
                        <button type="button" class="btn-danger" style="font-size:0.8rem; padding:0.4rem 1rem"
                            th:attr="onclick='apriModal(' + ${rec.id} + ')'">
                            Elimina
                        </button>
                        <form th:id="'form-elimina-' + ${rec.id}" th:action="@{/recensioni/elimina/{id}(id=${rec.id})}"
                            method="post" style="display:none">
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal conferma elimina -->
        <div id="modal-overlay" style="display:none; position:fixed; inset:0;
             background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center">
            <div style="background:var(--bg-card); border:1px solid var(--border-gold);
                        border-radius:var(--radius); padding:2rem; max-width:400px; width:90%; text-align:center;
                        box-shadow: 0 0 40px rgba(201,168,76,0.2)">
                <div style="font-size:2rem; margin-bottom:1rem">🗑️</div>
                <h3 style="font-family:var(--font-main); color:var(--accent-gold);
                           font-weight:normal; margin-bottom:0.75rem; font-size:1.4rem">
                    Elimina recensione
                </h3>
                <p style="color:var(--text-secondary); margin-bottom:1.75rem; font-size:0.95rem; line-height:1.5">
                    Sei sicuro di voler eliminare questa recensione?<br>
                    <span style="color:var(--text-muted); font-size:0.85rem">L'operazione è irreversibile.</span>
                </p>
                <div style="display:flex; gap:1rem; justify-content:center">
                    <button type="button" class="btn-secondary" onclick="chiudiModal()">Annulla</button>
                    <button type="button" class="btn-danger" id="btn-conferma">Elimina</button>
                </div>
            </div>
        </div>

        <script>
            let formIdCorrente = null;

            function apriModal(recensioneId) {
                formIdCorrente = recensioneId;
                const overlay = document.getElementById('modal-overlay');
                overlay.style.display = 'flex';
            }

            function chiudiModal() {
                document.getElementById('modal-overlay').style.display = 'none';
                formIdCorrente = null;
            }

            document.getElementById('btn-conferma').addEventListener('click', function () {
                if (formIdCorrente !== null) {
                    document.getElementById('form-elimina-' + formIdCorrente).submit();
                }
            });

            document.getElementById('modal-overlay').addEventListener('click', function (e) {
                if (e.target === this) chiudiModal();
            });
        </script>

    </th:block>
</body>

</html>
