<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Registrazione')}">

<body>
    <th:block th:fragment="content">
        <div class="form-container">
            <h2>Registrati</h2>
            <form th:action="@{/registrazione}" th:object="${utente}" method="post">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" />
                    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error"></span>
                </div>
                <div class="form-group">
                    <label>Cognome</label>
                    <input type="text" th:field="*{cognome}" />
                    <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}" class="error"></span>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" />
                    <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error"></span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" />
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
                </div>
                <button type="submit" class="btn-primary">Registrati</button>
                <div style="display:flex; align-items:center; gap:1rem; margin:1.5rem 0">
                    <div style="flex:1; height:1px; background:var(--border)"></div>
                    <span style="color:var(--text-muted); font-size:0.85rem">oppure</span>
                    <div style="flex:1; height:1px; background:var(--border)"></div>
                </div>
                <a href="/oauth2/authorization/google" class="btn-secondary"
                    style="display:block; text-align:center; padding:0.75rem">
                    🔵 Accedi con Google
                </a>
            </form>
            <p>Hai già un account? <a th:href="@{/login}">Accedi</a></p>
        </div>
    </th:block>
</body>

</html>
