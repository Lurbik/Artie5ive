<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Categoria')}">

<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <h1 th:text="${categoria.id == null} ? 'Nuova Categoria' : 'Modifica Categoria'"></h1>
            <a th:href="@{/admin/categorie}" class="btn-secondary">← Indietro</a>
        </div>
        <div class="form-container" style="margin-top:0">
            <form
                th:action="${categoria.id == null} ? @{/admin/categorie/nuovo} : @{/admin/categorie/modifica/{id}(id=${categoria.id})}"
                th:object="${categoria}" method="post">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" required />
                </div>
                <div class="form-group">
                    <label>Descrizione</label>
                    <textarea th:field="*{descrizione}" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Salva</button>
                </div>
            </form>
        </div>
    </th:block>
</body>

</html>
