<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content}, 'Produttore')}">
<body>
    <th:block th:fragment="content">
        <h2 th:text="${produttore.id == null} ? 'Nuovo Produttore' : 'Modifica Produttore'"></h2>

        <form th:action="${produttore.id == null} ? @{/admin/produttori/nuovo} : @{/admin/produttori/modifica/{id}(id=${produttore.id})}"
              th:object="${produttore}" method="post">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" />
                <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error"></span>
            </div>
            <div class="form-group">
                <label>Descrizione</label>
                <textarea th:field="*{descrizione}" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Anno Fondazione</label>
                <input type="number" th:field="*{annoFondazione}" />
            </div>
            <div class="form-group">
                <label>Regione</label>
                <select th:field="*{regione}">
                    <option value="">-- Seleziona regione --</option>
                    <option th:each="r : ${regioni}"
                            th:value="${r.id}"
                            th:text="${r.nome}"></option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Salva</button>
            <a th:href="@{/admin/produttori}">Annulla</a>
        </form>
    </th:block>
</body>
</html>
