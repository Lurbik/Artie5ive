<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content}, 'Gestione Produttori')}">
<body>
    <th:block th:fragment="content">

        <div class="page-header">
            <h1>Gestione Produttori</h1>
            <a th:href="@{/admin/produttori/nuovo}" class="btn-primary">+ Nuovo Produttore</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Regione</th>
                        <th>Anno Fondazione</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${produttori}">
                        <td th:text="${p.nome}"></td>
                        <td th:text="${p.regione?.nome ?: '—'}"></td>
                        <td th:text="${p.annoFondazione ?: '—'}"></td>
                        <td>
                            <a th:href="@{/admin/produttori/modifica/{id}(id=${p.id})}"
                               class="btn-secondary"
                               style="font-size:0.8rem; padding:0.4rem 1rem; margin-right:0.5rem">
                                Modifica
                            </a>
                            <form th:action="@{/admin/produttori/elimina/{id}(id=${p.id})}"
                                  method="post" style="display:inline">
                                <button type="submit" class="btn-danger"
                                        style="font-size:0.8rem; padding:0.4rem 1rem"
                                        onclick="return confirm('Eliminare questo produttore?')">
                                    Elimina
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </th:block>
</body>
</html>
