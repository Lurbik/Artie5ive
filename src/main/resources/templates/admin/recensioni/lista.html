<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Gestione Recensioni')}">

<body>
    <th:block th:fragment="content">

        <div class="page-header">
            <h1>Gestione Recensioni</h1>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Utente</th>
                        <th>Vino</th>
                        <th>Voto</th>
                        <th>Testo</th>
                        <th>Data</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rec : ${recensioni}">
                        <td th:text="${rec.utente.username}"></td>
                        <td th:text="${rec.vino.nome}"></td>
                        <td th:text="${rec.voto} + '/5'"></td>
                        <td th:text="${rec.testo}"></td>
                        <td th:text="${rec.data}"></td>
                        <td>
                            <button type="button" class="btn-danger" th:attr="onclick='apriModal(' + ${rec.id} + ')'">
                                Elimina
                            </button>
                            <form th:id="'form-elimina-' + ${rec.id}"
                                th:action="@{/admin/recensioni/elimina/{id}(id=${rec.id})}" method="post"
                                style="display:none"></form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal conferma elimina -->
        <div id="modal-overlay" style="display:none; position:fixed; inset:0;
             background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center">
            <div style="background:var(--bg-card); border:1px solid var(--border-gold);
                        border-radius:var(--radius); padding:2rem; max-width:400px; width:90%;
                        text-align:center; box-shadow:0 0 40px rgba(201,168,76,0.2)">
                <div style="font-size:2rem; margin-bottom:1rem">🗑️</div>
                <h3 style="font-family:var(--font-main); color:var(--accent-gold);
                           font-weight:normal; margin-bottom:0.75rem; font-size:1.4rem">
                    Elimina recensione
                </h3>
                <p style="color:var(--text-secondary); margin-bottom:1.75rem; font-size:0.95rem; line-height:1.5">
                    Sei sicuro di voler eliminare questa recensione?<br>
                    <span style="color:var(--text-muted); font-size:0.85rem">L'operazione è irreversibile.</span>
                </p>
                <div style="display:flex; gap:1rem; justify-content:center">
                    <button type="button" class="btn-secondary" onclick="chiudiModal()">Annulla</button>
                    <button type="button" class="btn-danger" id="btn-conferma">Elimina</button>
                </div>
            </div>
        </div>

        <script>
            let formIdCorrente = null;
            function apriModal(id) {
                formIdCorrente = id;
                document.getElementById('modal-overlay').style.display = 'flex';
            }
            function chiudiModal() {
                document.getElementById('modal-overlay').style.display = 'none';
                formIdCorrente = null;
            }
            document.getElementById('btn-conferma').addEventListener('click', function () {
                if (formIdCorrente !== null)
                    document.getElementById('form-elimina-' + formIdCorrente).submit();
            });
            document.getElementById('modal-overlay').addEventListener('click', function (e) {
                if (e.target === this) chiudiModal();
            });
        </script>

    </th:block>
</body>

</html>
