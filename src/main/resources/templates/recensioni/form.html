<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Nuova Recensione')}">

<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <h1 th:text="${recensione.id == null} ? 'Scrivi una recensione' : 'Modifica recensione'"></h1>
            <a th:href="@{/vini/{id}(id=${vinoId})}" class="btn-secondary">← Torna al vino</a>
        </div>
        <div class="form-container" style="margin-top:0">
            <div th:if="${errore}" class="alert alert-error" th:text="${errore}"></div>
            <form
                th:action="${recensione.id == null} ? @{/recensioni/nuova/{id}(id=${vinoId})} : @{/recensioni/modifica/{id}(id=${recensione.id})}"
                th:object="${recensione}" method="post">
                <div class="form-group">
                    <label>Voto (1-5)</label>
                    <input type="number" th:field="*{voto}" min="1" max="5" required />
                    <span th:if="${#fields.hasErrors('voto')}" th:errors="*{voto}" class="error"></span>
                </div>
                <div class="form-group">
                    <label>La tua recensione</label>
                    <textarea th:field="*{testo}" rows="5"
                        placeholder="Descrivi la tua esperienza con questo vino..."></textarea>
                    <span th:if="${#fields.hasErrors('testo')}" th:errors="*{testo}" class="error"></span>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Invia</button>
                </div>
            </form>
        </div>
    </th:block>
</body>

</html>
