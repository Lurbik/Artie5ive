<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
    th:fragment="layout(content, title)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Artie5ive — Cantina'">Artie5ive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container">
        <th:block th:replace="${content}"></th:block>
    </main>

    <footer>
        <p>© 2026 Artie5ive — Cantina Vini</p>
    </footer>

    <audio id="bg-music" autoplay loop style="display:none" th:src="@{/audio/jazz-music.mp3}"></audio>
    <script th:inline="none">
        (function () {
            var audio = document.getElementById('bg-music');
            if (!audio) return;

            var savedTime = sessionStorage.getItem('bgMusicTime');

            function ripristinaPosizione() {
                if (savedTime !== null) {
                    audio.currentTime = parseFloat(savedTime);
                }
            }

            if (audio.readyState >= 1) {
                ripristinaPosizione();
            } else {
                audio.addEventListener('loadedmetadata', ripristinaPosizione);
            }

            setInterval(function () {
                sessionStorage.setItem('bgMusicTime', audio.currentTime);
            }, 1000);

            window.addEventListener('beforeunload', function () {
                sessionStorage.setItem('bgMusicTime', audio.currentTime);
            });
        })();
    </script>
</body>

</html>
