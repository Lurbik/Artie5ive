<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
    th:replace="~{layout :: layout(~{::content}, 'Catalogo Interattivo')}">

<body>
    <th:block th:fragment="content">

        <div class="page-header">
            <h1>Catalogo Interattivo</h1>
            <span style="color:var(--text-muted); font-size:0.85rem">Powered by React</span>
        </div>

        <div id="root">
            <div style="text-align:center; padding:4rem; color:var(--text-muted)">
                Caricamento...
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

        <script type="text/babel">
            const { useState, useEffect } = React;

            function stelle(voto) {
                return '★'.repeat(voto) + '☆'.repeat(5 - voto);
            }

            function ModalVino({ vino, onClose }) {
                const [recensioni, setRecensioni] = useState([]);
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    fetch(`/api/vini/${vino.id}/recensioni`)
                        .then(r => r.json())
                        .then(data => { setRecensioni(data); setLoading(false); })
                        .catch(() => setLoading(false));
                }, [vino.id]);

                return (
                    <div onClick={e => e.target === e.currentTarget && onClose()}
                        style={{
                            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)',
                            zIndex: 1000, display: 'flex', alignItems: 'center',
                            justifyContent: 'center', padding: '1rem'
                        }}>
                        <div style={{
                            background: 'var(--bg-card)', border: '1px solid var(--border-gold)',
                            borderRadius: 'var(--radius)', maxWidth: '700px', width: '100%',
                            maxHeight: '85vh', overflowY: 'auto', padding: '2rem', position: 'relative',
                            boxShadow: '0 0 40px rgba(201,168,76,0.2)'
                        }}>
                            <button onClick={onClose}
                                style={{
                                    position: 'absolute', top: '1rem', right: '1rem',
                                    background: 'none', border: 'none', color: 'var(--text-muted)',
                                    fontSize: '1.4rem', cursor: 'pointer'
                                }}>✕</button>

                            <div style={{
                                display: 'grid', gridTemplateColumns: '220px 1fr',
                                gap: '2rem', marginBottom: '2rem'
                            }}>
                                <div>
                                    {vino.immagine
                                        ? <img src={`/uploads/${vino.immagine}`} alt={vino.nome}
                                            style={{
                                                width: '100%', borderRadius: 'var(--radius)',
                                                border: '1px solid var(--border)'
                                            }} />
                                        : <div style={{
                                            width: '100%', height: '220px',
                                            background: 'var(--bg-secondary)',
                                            borderRadius: 'var(--radius)', display: 'flex',
                                            alignItems: 'center', justifyContent: 'center',
                                            fontSize: '4rem'
                                        }}>🍷</div>
                                    }
                                </div>
                                <div>
                                    <h2 style={{
                                        fontFamily: 'var(--font-main)', fontSize: '1.8rem',
                                        fontWeight: 'normal', color: 'var(--text-primary)',
                                        marginBottom: '0.5rem'
                                    }}>{vino.nome}</h2>
                                    <div style={{
                                        color: 'var(--accent-gold)', marginBottom: '1rem',
                                        letterSpacing: '0.05em'
                                    }}>
                                        {vino.produttore}{vino.regione ? ` · ${vino.regione}` : ''}
                                    </div>
                                    <div style={{ marginBottom: '1rem' }}>
                                        <span className="badge badge-wine">{vino.colore}</span>
                                        <span className="badge badge-muted">{vino.stile}</span>
                                    </div>
                                    <div style={{
                                        display: 'grid', gridTemplateColumns: '1fr 1fr',
                                        gap: '0.75rem', marginBottom: '1.25rem'
                                    }}>
                                        <div className="attributo">
                                            <div className="attributo-label">Annata</div>
                                            <div className="attributo-value">{vino.annata}</div>
                                        </div>
                                        {vino.gradazione && (
                                            <div className="attributo">
                                                <div className="attributo-label">Gradazione</div>
                                                <div className="attributo-value">{vino.gradazione}% vol</div>
                                            </div>
                                        )}
                                    </div>
                                    {vino.descrizione && (
                                        <p style={{
                                            color: 'var(--text-secondary)', lineHeight: 1.6,
                                            fontSize: '0.9rem'
                                        }}>{vino.descrizione}</p>
                                    )}
                                </div>
                            </div>

                            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '1.5rem' }}>
                                <h3 style={{
                                    fontFamily: 'var(--font-main)', color: 'var(--accent-gold)',
                                    fontWeight: 'normal', marginBottom: '1rem',
                                    fontSize: '1.2rem'
                                }}>Recensioni</h3>
                                {loading && <p style={{ color: 'var(--text-muted)' }}>Caricamento...</p>}
                                {!loading && recensioni.length === 0 && (
                                    <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>
                                        Nessuna recensione ancora.
                                    </p>
                                )}
                                {recensioni.map(r => (
                                    <div key={r.id} className="recensione-card">
                                        <div className="recensione-header">
                                            <span className="recensione-autore">{r.utente}</span>
                                            <span className="stelle">{stelle(r.voto)}</span>
                                        </div>
                                        <p className="recensione-testo">{r.testo}</p>
                                        <p style={{
                                            color: 'var(--text-muted)', fontSize: '0.78rem',
                                            marginTop: '0.4rem'
                                        }}>{r.data}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            function App() {
                const [vini, setVini] = useState([]);
                const [loading, setLoading] = useState(true);
                const [filtroNome, setFiltroNome] = useState('');
                const [filtroColore, setFiltroColore] = useState('');
                const [vinoSelezionato, setVinoSelezionato] = useState(null);

                useEffect(() => {
                    fetch('/api/vini')
                        .then(r => r.json())
                        .then(data => { setVini(data); setLoading(false); })
                        .catch(() => setLoading(false));
                }, []);

                const viniFiltrati = vini.filter(v => {
                    const nomeOk = v.nome.toLowerCase().includes(filtroNome.toLowerCase());
                    const coloreOk = !filtroColore || v.colore === filtroColore;
                    return nomeOk && coloreOk;
                });

                const colori = [...new Set(vini.map(v => v.colore).filter(Boolean))];

                return (
                    <div>
                        <div className="filtri-bar">
                            <div className="form-group" style={{ marginBottom: 0 }}>
                                <label>Cerca</label>
                                <input type="text" placeholder="Nome del vino..."
                                    value={filtroNome}
                                    onChange={e => setFiltroNome(e.target.value)} />
                            </div>
                            <div className="form-group" style={{ marginBottom: 0 }}>
                                <label>Colore</label>
                                <select value={filtroColore}
                                    onChange={e => setFiltroColore(e.target.value)}>
                                    <option value="">Tutti</option>
                                    {colori.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            {(filtroNome || filtroColore) && (
                                <button className="btn-secondary"
                                    onClick={() => { setFiltroNome(''); setFiltroColore(''); }}>
                                    Reset
                                </button>
                            )}
                            <span style={{
                                color: 'var(--text-muted)', fontSize: '0.85rem',
                                alignSelf: 'center', marginLeft: 'auto'
                            }}>
                                {viniFiltrati.length} vino{viniFiltrati.length !== 1 ? 'i' : ''}
                            </span>
                        </div>

                        {loading && (
                            <div style={{
                                textAlign: 'center', padding: '4rem',
                                color: 'var(--text-muted)'
                            }}>
                                Caricamento vini...
                            </div>
                        )}

                        {!loading && viniFiltrati.length === 0 && (
                            <div style={{
                                textAlign: 'center', padding: '4rem',
                                color: 'var(--text-muted)'
                            }}>
                                Nessun vino trovato.
                            </div>
                        )}

                        <div className="card-grid">
                            {viniFiltrati.map(vino => (
                                <div key={vino.id} className="card"
                                    style={{ cursor: 'pointer' }}
                                    onClick={() => setVinoSelezionato(vino)}>
                                    {vino.immagine
                                        ? <img className="card-img"
                                            src={`/uploads/${vino.immagine}`}
                                            alt={vino.nome} />
                                        : <div className="card-img-placeholder">🍷</div>
                                    }
                                    <div className="card-body">
                                        <div className="card-title">{vino.nome}</div>
                                        <div className="card-subtitle">
                                            {vino.produttore ? `${vino.produttore} · ` : ''}{vino.annata}
                                        </div>
                                        <div>
                                            <span className="badge badge-wine">{vino.colore}</span>
                                            <span className="badge badge-muted">{vino.stile}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {vinoSelezionato && (
                            <ModalVino vino={vinoSelezionato}
                                onClose={() => setVinoSelezionato(null)} />
                        )}
                    </div>
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        </script>

    </th:block>
</body>

</html>
