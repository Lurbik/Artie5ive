<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
    th:replace="~{layout :: layout(~{::content}, 'Dettaglio Vino')}">

<body>
    <th:block th:fragment="content">
        <div th:if="${vino != null}">

            <!-- Dettaglio principale -->
            <div class="dettaglio-grid">
                <div>
                    <div class="card-img-placeholder" th:if="${vino.immagine == null}"
                        style="height:350px; border-radius: var(--radius); border: 1px solid var(--border)">🍷</div>
                    <img class="dettaglio-img" th:if="${vino.immagine != null}"
                        th:src="@{/uploads/{img}(img=${vino.immagine})}" th:alt="${vino.nome}" />
                </div>
                <div class="dettaglio-info">
                    <h1 th:text="${vino.nome}"></h1>
                    <div class="dettaglio-meta">
                        <span th:text="${vino.produttore?.nome}"></span>
                        <span th:if="${vino.regione != null}"> · <span th:text="${vino.regione.nome}"></span></span>
                    </div>

                    <div style="margin-bottom: 1.5rem">
                        <span class="badge badge-wine" th:text="${vino.colore}"></span>
                        <span class="badge badge-muted" th:text="${vino.stile}"></span>
                        <span class="badge badge-gold" th:each="cat : ${vino.categorie}" th:text="${cat.nome}"></span>
                    </div>

                    <div class="dettaglio-attributi">
                        <div class="attributo">
                            <div class="attributo-label">Annata</div>
                            <div class="attributo-value" th:text="${vino.annata}"></div>
                        </div>
                        <div class="attributo">
                            <div class="attributo-label">Gradazione</div>
                            <div class="attributo-value" th:text="${vino.gradazione} + '% vol'"></div>
                        </div>
                        <div class="attributo" th:if="${vino.produttore != null}">
                            <div class="attributo-label">Produttore</div>
                            <div class="attributo-value">
                                <a th:href="@{/produttori/{id}(id=${vino.produttore.id})}"
                                    th:text="${vino.produttore.nome}"></a>
                            </div>
                        </div>
                        <div class="attributo" th:if="${vino.regione != null}">
                            <div class="attributo-label">Regione</div>
                            <div class="attributo-value" th:text="${vino.regione.nome}"></div>
                        </div>
                    </div>

                    <p class="card-text" th:if="${vino.descrizione != null}" th:text="${vino.descrizione}"></p>

                    <!-- Bottone recensione -->
                    <div sec:authorize="isAuthenticated()" style="margin-top:1.5rem">
                        <a th:href="@{/recensioni/nuova/{id}(id=${vino.id})}" class="btn-primary">
                            Scrivi una recensione
                        </a>
                    </div>
                    <div sec:authorize="isAnonymous()" style="margin-top:1.5rem">
                        <a th:href="@{/login}" class="btn-secondary">Accedi per recensire</a>
                    </div>
                </div>
            </div>

            <!-- Sezione recensioni -->
            <div class="page-header" style="margin-top: 2rem">
                <h1 style="font-size: 1.5rem">Recensioni</h1>
            </div>

            <div th:if="${#lists.isEmpty(recensioni)}"
                style="color: var(--text-muted); padding: 2rem 0; text-align:center">
                Nessuna recensione ancora. Sii il primo!
            </div>

            <div th:each="rec : ${recensioni}" class="recensione-card">
                <div class="recensione-header">
                    <span class="recensione-autore" th:text="${rec.utente.username}"></span>
                    <div class="stelle">
                        <th:block th:each="i : ${#numbers.sequence(1, rec.voto)}">★</th:block>
                        <th:block th:each="i : ${#numbers.sequence(rec.voto + 1, 5)}">☆</th:block>
                    </div>
                </div>
                <p class="recensione-testo" th:text="${rec.testo}"></p>
                <p style="color: var(--text-muted); font-size:0.8rem; margin-top:0.5rem" th:text="${rec.data}"></p>

                <!-- Elimina se admin o propria recensione -->
                <div style="margin-top:0.75rem">
                    <form th:action="@{/recensioni/elimina/{id}(id=${rec.id})}" method="post" style="display:inline"
                        sec:authorize="isAuthenticated()"
                        th:if="${rec.utente.username == #authentication.name and not #authorization.expression('hasRole(''ADMIN'')')}">
                        <button type="submit" class="btn-danger" style="font-size:0.8rem; padding:0.4rem 1rem"
                            onclick="return confirm('Eliminare questa recensione?')">
                            Elimina
                        </button>
                    </form>
                    <form th:action="@{/admin/recensioni/elimina/{id}(id=${rec.id})}" method="post"
                        style="display:inline" sec:authorize="hasRole('ADMIN')">
                        <button type="submit" class="btn-danger" style="font-size:0.8rem; padding:0.4rem 1rem"
                            onclick="return confirm('Eliminare questa recensione?')">
                            Elimina (admin)
                        </button>
                    </form>
                </div>
            </div>

        </div>

        <!-- Vino non trovato -->
        <div th:if="${vino == null}" style="text-align:center; padding:4rem; color:var(--text-muted)">
            <p>Vino non trovato.</p>
            <a th:href="@{/vini}" class="btn-secondary" style="margin-top:1rem">← Torna al catalogo</a>
        </div>

    </th:block>
</body>

</html>
