<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: layout(~{::content}, 'Vini')}">
<body>
    <th:block th:fragment="content">
        <h2>Catalogo Vini</h2>

        <!-- Form filtri -->
        <form th:action="@{/vini/filtra}" method="get">
            <input type="number" name="annata" placeholder="Annata" />
            <select name="regioneId">
                <option value="">Tutte le regioni</option>
                <option th:each="r : ${regioni}" th:value="${r.id}" th:text="${r.nome}"></option>
            </select>
            <select name="produttoreId">
                <option value="">Tutti i produttori</option>
                <option th:each="p : ${produttori}" th:value="${p.id}" th:text="${p.nome}"></option>
            </select>
            <button type="submit">Filtra</button>
            <a th:href="@{/vini}">Reset</a>
        </form>

        <!-- Lista vini -->
        <div th:if="${#lists.isEmpty(vini)}">
            <p>Nessun vino trovato.</p>
        </div>
        <div th:each="vino : ${vini}">
            <h3>
                <a th:href="@{/vini/{id}(id=${vino.id})}" th:text="${vino.nome}"></a>
            </h3>
            <p th:text="${vino.annata}"></p>
            <p th:text="${vino.colore}"></p>
            <p th:text="${vino.produttore?.nome}"></p>
        </div>
    </th:block>
</body>
</html>
