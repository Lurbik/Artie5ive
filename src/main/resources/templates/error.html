<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Errore')}">

<body>
    <th:block th:fragment="content">
        <div style="text-align:center; padding:6rem 2rem">
            <div style="font-size:4rem; margin-bottom:1.5rem">🍷</div>
            <h1 style="font-family:var(--font-main); color:var(--accent-gold);
                       font-weight:normal; font-size:2.2rem; margin-bottom:1rem">
                Qualcosa è andato storto
            </h1>
            <p style="color:var(--text-secondary); font-size:1rem; margin-bottom:0.5rem">
                <span th:if="${status} == 404">La pagina che cerchi non esiste.</span>
                <span th:if="${status} == 403">Non hai i permessi per accedere a questa pagina.</span>
                <span th:if="${status} == 500">Si è verificato un errore interno al server.</span>
                <span th:unless="${status} == 404 or ${status} == 403 or ${status} == 500">
                    Si è verificato un errore imprevisto.
                </span>
            </p>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:2.5rem">
                Riprova più tardi o torna alla home.
            </p>
            <a th:href="@{/}" class="btn-primary">Torna alla home</a>
        </div>
    </th:block>
</body>

</html>
