<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Produttori')}">

<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <h1>Produttori</h1>
        </div>
        <div class="card-grid" style="max-width:100%">
            <div class="card" th:each="p : ${produttori}">
                <div class="card-img-placeholder" th:if="${p.immagine == null}">🏭</div>
                <img class="card-img" th:if="${p.immagine != null}" th:src="@{/uploads/{img}(img=${p.immagine})}"
                    th:alt="${p.nome}" />
                <div class="card-body">
                    <h3 class="card-title" th:text="${p.nome}"></h3>
                    <p class="card-subtitle" th:text="${p.regione?.nome}"></p>
                    <p class="card-text" th:text="|Numero vini: ${conteggioVini[p.id]}|"></p>
                    <p class="card-text" th:text="${p.annoFondazione != null} ? 'Est. ' + ${p.annoFondazione} : ''"></p>
                    <a th:href="@{/produttori/{id}(id=${p.id})}" class="btn-primary"
                        style="font-size:0.8rem; padding:0.5rem 1rem">Scopri</a>
                </div>
            </div>
        </div>
    </th:block>
</body>

</html>
